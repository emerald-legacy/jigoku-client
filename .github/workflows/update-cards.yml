name: Update Card Data
permissions:
    contents: read
on:
  workflow_dispatch:
    inputs:
      card_set:
        description: 'Which card images to download'
        required: true
        type: choice
        options:
          - all
          - emerald-legacy
        default: all
      force_images:
        description: 'Re-download all images (even existing ones)'
        required: false
        type: boolean
        default: false

jobs:
  update-cards:
    runs-on: ubuntu-latest
    steps:
      - name: Update card data on Lightsail
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            cd /opt/jigoku
            FORCE_FLAG=${{ inputs.force_images == true && '--force' || '' }}
            CYCLE_FLAG="${{ inputs.card_set != 'all' && format('--cycle {0}', inputs.card_set) || '' }}"
            docker compose -f docker-compose.prod.yml exec -T --user node lobby \
              node build/server/scripts/fetchdata.js live $FORCE_FLAG $CYCLE_FLAG
